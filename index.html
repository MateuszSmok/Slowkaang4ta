<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Nauka słówek</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    width: 500px;
    text-align: center;
    position: relative;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 90%;
    padding: 10px;
    font-size: 16px;
    margin-bottom: 15px;
}

.button-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

.check { background: #4CAF50; color: white; }
.skip { background: #f39c12; color: white; }
.next { background: #3498db; color: white; }
.reveal { 
    background: #e74c3c; 
    color: white; 
    position: absolute;
    top: 40px;
    right: 20px;
    display: none;
    font-size: 13px;
    padding: 7px 12px;
}

.result {
    margin-top: 15px;
    font-weight: bold;
}
.correct { color: green; }
.wrong { color: red; }
</style>
</head>
<body>

<div class="container">
    <h2 id="polishWord"></h2>
    <input type="text" id="answer" placeholder="Wpisz tłumaczenie...">
    
    <div class="button-container">
        <button class="check" onclick="checkOrNext()">Sprawdź / Następne</button>
        <button class="skip" onclick="skipWord()">Pomiń</button>
    </div>

    <button class="reveal" id="revealBtn" onclick="revealAnswer()">Odkryj słówko</button>
    <div class="result" id="result"></div>
</div>

<script>
const words = [
{pl:"szczotka", en:["brush"]},
{pl:"zmieniać pościel", en:["change the sheets"]},
{pl:"szufelka", en:["dustpan"]},
{pl:"pracować w ogrodzie", en:["do the gardening"]},
{pl:"robić pranie", en:["do the laundry"]},
{pl:"zajmować się domem", en:["do the housework"]},
{pl:"wycierać kurz z mebli", en:["dust the furniture"]},
{pl:"opróżniać zmywarkę", en:["empty the dishwasher"]},
{pl:"opróżniać kosz na śmieci", en:["empty the rubbish bin"]},
{pl:"pozbywać się niepotrzebnych rzeczy", en:["have a clear out"]},
{pl:"mieć dobrą rękę do roślin", en:["have green fingers"]},
{pl:"odkurzać dywan", en:["hoover the carpet"]},
{pl:"prasować ubrania", en:["iron the clothes"]},
{pl:"utrzymywać coś w nienagannym porządku", en:["keep sth neat and tidy"]},
{pl:"wprowadzać ulepszenia", en:["make improvements"]},
{pl:"ścielić łóżko", en:["make the bed"]},
{pl:"wycierać podłogę mopem", en:["mop the floor"]},
{pl:"kosić trawnik", en:["mow the lawn"]},
{pl:"odnowić korytarz", en:["renovate a corridor"]},
{pl:"gumowe rękawiczki", en:["rubber gloves"]},
{pl:"torba na zakupy", en:["shopping bag"]},
{pl:"gąbka", en:["sponge"]},
{pl:"zamiatać podłogę", en:["sweep the floor"]},
{pl:"ścierka", en:["tea towel"]}
];

let currentIndex = 0;
let lastAnswerCorrect = false;
let checked = false; // Czy odpowiedź została już sprawdzona

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

shuffle(words);

function showWord() {
    document.getElementById("polishWord").textContent = words[currentIndex].pl;
    document.getElementById("answer").value = "";
    document.getElementById("result").textContent = "";
    document.getElementById("result").className = "result";
    document.getElementById("revealBtn").style.display = "none";
    lastAnswerCorrect = false;
    checked = false;
}

function normalize(text) {
    return text.toLowerCase().trim();
}

// Sprawdzenie odpowiedzi lub przejście dalej
function checkOrNext() {
    if (!checked) {
        const userAnswer = normalize(document.getElementById("answer").value);
        const correctAnswers = words[currentIndex].en.map(a => normalize(a));
        if (correctAnswers.includes(userAnswer)) {
            document.getElementById("result").textContent = "✅ Poprawnie!";
            document.getElementById("result").className = "result correct";
            lastAnswerCorrect = true;
        } else {
            document.getElementById("result").textContent = "❌ Błąd!";
            document.getElementById("result").className = "result wrong";
            document.getElementById("revealBtn").style.display = "inline-block";
            lastAnswerCorrect = false;
        }
        checked = true;
    } else {
        // Jeśli sprawdzono już odpowiedź, przejdź dalej
        nextWord();
    }
}

function revealAnswer() {
    document.getElementById("result").textContent += " Poprawna odpowiedź: " + words[currentIndex].en.join(" / ");
    lastAnswerCorrect = true; // Po odkryciu można przejść dalej Enterem
}

function skipWord() {
    nextWord(true);
}

function nextWord(skip=false) {
    if (!skip && !lastAnswerCorrect && !checked) {
        checkOrNext(); // Jeśli nie sprawdzono i odpowiedź źle → sprawdź
        return;
    }
    currentIndex++;
    if (currentIndex >= words.length) {
        shuffle(words);
        currentIndex = 0;
    }
    showWord();
}

// Enter obsługuje jak kliknięcie sprawdź/następne
document.getElementById("answer").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        checkOrNext();
    }
});

showWord();
</script>

</body>
</html>
